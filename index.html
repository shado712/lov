<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محادثة حيدر ومارية</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#6a11cb,#ff4d6d);
    font-family:'Segoe UI',Tahoma;
    overflow:hidden;
}

.chat{
    width:90%;
    max-width:400px;
    display:flex;
    flex-direction:column;
    animation:fade 1s;
}

.msg{
    padding:14px 18px;
    margin:8px 0;
    border-radius:20px;
    max-width:80%;
    color:white;
    font-size:16px;
    animation:slide .4s ease;
}

.received{
    background:#2f3136;
    align-self:flex-start;
    border-bottom-right-radius:5px;
}

.sent{
    background:#ff4d6d;
    align-self:flex-end;
    border-bottom-left-radius:5px;
    cursor:pointer;
    transition:.3s;
}

.sent:hover{
    transform:scale(1.03);
}

.card{
    margin-top:10px;
    padding:15px;
    border-radius:18px;
    background:rgba(255,255,255,.15);
    color:white;
    text-align:center;
    cursor:pointer;
    backdrop-filter:blur(5px);
    transition:.3s;
}

.card:hover{
    background:rgba(255,255,255,.25);
    transform:translateY(-2px);
}

#love-page{
    position:fixed;
    inset:0;
    background:#ffeef2;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:fade 1s;
}

#love-page img{
    width:220px;
    margin-bottom:20px;
}

h1{
    color:#ff4d6d;
    margin:10px 0;
}

p{
    color:#555;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#ff3355;
}

@keyframes fade{
    from{opacity:0}
    to{opacity:1}
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="chat" id="chatBox">

    <div class="msg received">
        مارية موجودة؟ 🌸
    </div>

    <div class="msg sent" onclick="showReply()">
        اي وضايعة عوفني حيدر 😔
    </div>

    <div id="reply" style="display:none;">

        <div class="msg received">
            شلون اكدر اعوفج شوفي؟ ❤️
        </div>

        <div class="card" onclick="openLove()">
            اضغطي هنا يا زهرتي 🌷
        </div>

    </div>

</div>

<div id="love-page">

    <img src="https://media.tenor.com/K_f9_9Obeo0AAAAi/hello-kitty-blushing.gif">

    <h1>هلو مارية.. حيدر يحبج ❤️</h1>

    <p>
        عندي سؤال الج... مستعدة؟ 🥺
    </p>

    <button onclick="showLove()">
        شنو هو؟
    </button>

</div>
