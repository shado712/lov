<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى جنّتي .. أمي</title>
    <style>
        :root { --gold: #d4af37; --deep-red: #800020; --pink: #ffb6c1; }
        body { 
            background: #000; margin: 0; font-family: 'Cairo', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; color: white;
        }

        /* القلوب المتحركة في الخلفية */
        .hearts { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .heart { position: absolute; color: rgba(255, 182, 193, 0.4); animation: fall linear infinite; }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* حاوية المحتوى */
        .container { 
            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); padding: 40px; border-radius: 50px; 
            border: 2px solid var(--gold); width: 85%; max-width: 450px; 
            text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            animation: fadeIn 2s ease-in-out;
        }

        .mom-img { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--gold); margin-bottom: 20px; object-fit: cover; animation: pulse 3s infinite; }
        
        h1 { color: var(--gold); font-size: 26px; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        p { font-size: 18px; line-height: 1.8; color: #fff; min-height: 100px; transition: 0.5s; }

        .btn { 
            background: linear-gradient(45deg, var(--gold), #f9e29c); color: #000; 
            border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; width: 100%;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="hearts" id="hearts-container"></div>

    <div class="container">
        <img src="https://i.pinimg.com/originals/94/3a/0d/943a0d63507663488737f5a60e1d13f9.gif" class="mom-img">
        <h1 id="title">ست الحبايب ❤️</h1>
        <p id="text">أمي.. أنتي العطاء الذي لا ينضب، والقلب الذي لا يمل من الحب. وجودكِ في حياتي هو أعظم نعمة من الله.</p>
        <button class="btn" onclick="nextStep()" id="btn-text">اضغط لترى قلبك</button>
    </div>

    <script>
        // صنع القلوب المتحركة
        const container = document.getElementById('hearts-container');
        for (let i = 0; i < 30; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            container.appendChild(heart);
        }

        let step = 0;
        const messages = [
            { t: "أمي..", p: "لو كتبتُ كل لغات العالم لن أصف قطرة من بحر حنانكِ. أنتي الشمس التي تشرق في أيامي الصعبة.", b: "استمر.." },
            { t: "يا جنّتي في الأرض", p: "تحت قدميكِ وجدنا الراحة، وفي دعائكِ نجد التوفيق. ربي يحفظكِ لي يا تاج رأسي.", b: "كلمة أخيرة" },
            { t: "أحبكِ يا أمي", p: "اللهم احفظ أمهاتنا وأطل في أعمارهن، وارحم من رحلت منهن واجعل قبرها روضة من رياض الجنة.", b: "آمين يا رب ❤️" }
        ];

        function nextStep() {
            if (step < messages.length) {
                document.getElementById('title').innerText = messages[step].t;
                document.getElementById('text').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('text').innerText = messages[step].p;
                    document.getElementById('text').style.opacity = 1;
                }, 500);
                document.getElementById('btn-text').innerText = messages[step].b;
                step++;
            } else {
                document.getElementById('text').innerHTML = "تم إرسال دعاء لقلب أمك الآن.. <br> اذهب وقبّل يدها ❤️";
                document.getElementById('btn-text').style.display = 'none';
            }
        }
    </script>
</body>
</html>
