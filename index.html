<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى مارية 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; background-color: #0b0b0b; color: white;
        }

        .main-wrapper {
            width: 100%; max-width: 450px; height: 100vh;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
            z-index: 1;
        }

        .slide.active { transform: translateX(0); z-index: 2; }
        .slide.prev { transform: translateX(-100%); z-index: 1; }

        /* البطاقة المربعة البيضاء - مضمونة الظهور */
        .img-square {
            width: 300px; height: 300px;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            margin-bottom: 30px;
            display: flex; align-items: center; justify-content: center;
        }
        .img-square img { width: 100%; height: 100%; object-fit: contain; }

        /* القلب التفاعلي - تم تصحيحه ليكون قابل للضغط */
        .interactive-heart {
            font-size: 120px;
            cursor: pointer;
            animation: pulse 0.8s infinite;
            filter: drop-shadow(0 0 20px #ff4d6d);
            margin: 40px 0;
            display: inline-block;
            pointer-events: auto !important; /* لضمان قابلية الضغط */
            user-select: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .content-box { text-align: center; width: 85%; margin-bottom: 40px; }
        .content-box h1 { font-size: 26px; color: #ff8fa3; margin-bottom: 10px; }
        .content-box p { font-size: 19px; line-height: 1.6; color: #f0f0f0; margin: 0; }

        .btn-action {
            background: #ff4d6d; color: white; border: none;
            padding: 15px 50px; border-radius: 50px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
            pointer-events: auto;
        }
        .btn-action:hover { background: #ff758f; }

        .hearts-bg { position: fixed; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart-unit { position: absolute; color: rgba(255, 77, 109, 0.5); animation: drift linear infinite; }
        @keyframes drift { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts"></div>
    <div class="main-wrapper" id="slider"></div>

    <script>
        // روابط صور Giphy سريعة التحميل
        const data = [
            { t: "مارية.. اعتذر 😔", p: "أدري الزعل أخذ مساحة بقلبج، بس والله الدنيا تظلم بعيني لو ضجتي لحظة.", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidWJycXJ4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9uH9T34u3U7YUnD/giphy.gif", b: "ممكن تسامحيني؟" },
            { t: "انتي الملكة 👑", p: "مارية، انتي تامرين وحيدر ينفذ. بس المهم ترجع الضحكة لوجهج.", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidWJycXJ4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/VduFvSgSPS2H4XpnhB/giphy.gif", b: "أحبج ❤️" },
            { t: "وعد من حيدر 💍", p: "أوعدج من اليوم ما أخلي دمعة تنزل من عينج.. راح أكون السند دائمًا.", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidWJycXJ4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/L4lvBpHWkARu7Aac75/giphy.gif", b: "مشتاق لج 🥺" },
            { t: "اضغطي على قلبي ❤️", p: "حتى تعرفين شكد يحبج..", g: "", isHeart: true },
            { t: "يا شمس حياتي ☀️", p: "انتي النور اللي يضوي طريقي. فديتج يا غالية.", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidWJycXJ4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/v86vXfG1KzE3MvW5sE/giphy.gif", b: "أعشقج" },
            { t: "حيدر ومارية سوا", p: "الزعل ممنوع من اليوم! أحبج ماريتي للأبد.", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidWJycXJ4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZHF4ZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/Y866z3V6Yf6WqXU8zL/giphy.gif", b: "تم الصلح بنجاح ✅" }
        ];

        let currentIdx = 0;
        const slider = document.getElementById('slider');

        data.forEach((item, i) => {
            const slide = document.createElement('div');
            slide.className = `slide ${i === 0 ? 'active' : ''}`;
            
            let middleContent = `<div class="img-square"><img src="${item.g}" alt="loading..."></div>`;
            if (item.isHeart) {
                middleContent = `<div class="interactive-heart" onclick="nextSlide()">❤️</div>`;
            }

            slide.innerHTML = `
                ${middleContent}
                <div class="content-box">
                    <h1>${item.t}</h1>
                    <p>${item.p}</p>
                </div>
                ${!item.isHeart ? `<button class="btn-action" onclick="nextSlide()">${item.b}</button>` : ''}
            `;
            slider.appendChild(slide);
        });

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if (currentIdx < slides.length - 1) {
                slides[currentIdx].classList.remove('active');
                slides[currentIdx].classList.add('prev');
                currentIdx++;
                slides[currentIdx].classList.add('active');
            } else {
                alert("أحبج مارية! ❤️");
            }
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart-unit'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '-50px';
            h.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.getElementById('hearts').appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 400);
    </script>
</body>
</html>
