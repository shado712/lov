<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ملكة قلبي مارية 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1: linear-gradient(135deg, #1a1a2e, #16213e);
            --p2: linear-gradient(135deg, #4568dc, #b06ab3);
            --p3: linear-gradient(135deg, #ff9a9e, #fad0c4);
            --gold: #ffd700;
        }

        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: 1s ease; background: var(--p1);
        }

        /* مؤثرات تساقط القلوب */
        .particle { position: fixed; top: -50px; user-select: none; pointer-events: none; z-index: 1; animation: fall linear infinite; }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* البطاقة الرئيسية */
        .main-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 50px; border: 2px solid rgba(255, 255, 255, 0.3);
            width: 85%; max-width: 400px; text-align: center; position: relative; z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        /* ستيكر الصور */
        .sticker-box {
            width: 150px; height: 150px; margin: 0 auto 20px;
            border-radius: 50%; border: 4px solid var(--gold);
            background: #fff; overflow: hidden; box-shadow: 0 0 20px var(--gold);
        }
        .sticker-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 24px; color: #fff; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        p { font-size: 17px; color: #eee; line-height: 1.8; min-height: 100px; margin-bottom: 25px; font-family: 'Tajawal', sans-serif; }

        /* زر تفاعلي */
        .action-btn {
            background: var(--gold); color: #000; border: none; padding: 15px 30px;
            border-radius: 30px; font-size: 18px; font-weight: 900; cursor: pointer;
            transition: 0.3s; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .action-btn:active { transform: scale(0.9); }

        /* القلب النباض التفاعلي */
        .beating-heart {
            font-size: 80px; color: #ff4d6d; cursor: pointer; display: none;
            animation: beat 0.8s infinite; filter: drop-shadow(0 0 10px #ff4d6d);
        }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        .progress-dots { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .active-dot { width: 25px; background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="main-card">
        <div class="sticker-box">
            <img src="https://media.tenor.com/OnY_qNqE4p8AAAAi/hello-kitty-shy.gif" id="main-gif">
        </div>
        <h1 id="main-title">مارية.. زهرتي 🌸</h1>
        <p id="main-text">أدري الزعل أخذ مساحة بقلبج، بس والله الدنيا تظلم بعيني لو ضجتي لحظة. حيدر يعتذر منج يا ملكة قلبه.</p>
        
        <div id="interactive-area">
            <div class="beating-heart" id="big-heart" onclick="heartPop()">❤️</div>
        </div>

        <button class="action-btn" onclick="nextPage()" id="btn-text">ممكن تسامحيني؟ 🥺</button>

        <div class="progress-dots" id="dots-container"></div>
    </div>

    <script>
        // نظام الصفحات والرسائل
        const story = [
            { 
                t: "مارية.. اعتذر 😔", 
                p: "ما كان قصدي أجرحج، أنتي أغلى شي عندي بالكون. سامحيني يا روح حيدر.", 
                g: "https://media.tenor.com/b9UaH8B6_OQAAAAi/mochi-peach.gif",
                bg: "linear-gradient(135deg, #0f0c29, #302b63, #24243e)",
                btn: "نكمل؟ ✨"
            },
            { 
                t: "انتي زهرتي 🌸", 
                p: "أنتي مو بس حبيبتي، أنتي الوردة اللي بستاني. بدون ضحكتج ذبلت أيامي.", 
                g: "https://media.tenor.com/vH97Zf_9680AAAAi/hello-kitty-flower.gif",
                bg: "linear-gradient(135deg, #74ebd5, #9face6)",
                btn: "أحبج ❤️"
            },
            { 
                t: "تذكري أيامنا 😍", 
                p: "تذكري ضحكتنا وسوالفنا؟ ما أريد الزعل ينسينا هاي اللحظات الحلوة اللي عشناها سوا.", 
                g: "https://media.tenor.com/Z45Z1A7_0mUAAAAi/hello-kitty.gif",
                bg: "linear-gradient(135deg, #ff9a9e, #fecfef)",
                btn: "مشتاق لج 🥺"
            },
            { 
                t: "وعد من حيدر 💍", 
                p: "أوعدج من اليوم ما أخلي دمعة تنزل من عينج، وراح أكون لج السند والأمان دائمًا.", 
                g: "https://media.tenor.com/K_f9_9Obeo0AAAAi/hello-kitty-blushing.gif",
                bg: "linear-gradient(135deg, #a18cd1, #fbc2eb)",
                btn: "دوسي عالقلب 👇"
            },
            { 
                t: "قلبي ينبض بإسمج", 
                p: "دوسي على هذا القلب وشوفي شكد يحبج يا مارية..", 
                g: "https://media.tenor.com/V7_5zWv-A60AAAAi/hello-kitty-love.gif",
                bg: "linear-gradient(135deg, #2c3e50, #000000)",
                btn: "صار أحسن؟",
                special: "heart"
            },
            { 
                t: "انتي الملكة 👑", 
                p: "مارية، أنتي تامرين وحيدر ينفذ. بس المهم ترجع الضحكة لوجهج المنور.", 
                g: "https://media.tenor.com/A6_L6R5v_OAAAAAi/cat-working.gif",
                bg: "linear-gradient(135deg, #f093fb, #f5576c)",
                btn: "كملي القراءة 😍"
            },
            { 
                t: "يا شمس حياتي ☀️", 
                p: "لو الدنيا كلها ضدي، يكفيني أنج وياي. أنتي النور اللي يضوي طريقي.", 
                g: "https://media.tenor.com/R3K98H6pU1EAAAAi/cute-rabbit.gif",
                bg: "linear-gradient(135deg, #f6d365, #fda085)",
                btn: "فديتج ❤️"
            },
            { 
                t: "بنيتي الصغيرة 🧸", 
                p: "أنتي طفلتي المدللة، ومسموح لج تزعلين وتتدللين، بس لا تبتعدين عني.", 
                g: "https://media.tenor.com/j_6W_Xq-S0AAAAAi/hello-kitty-sanrio.gif",
                bg: "linear-gradient(135deg, #e0c3fc, #8ec5fc)",
                btn: "بقت صفحتين.. ✨"
            },
            { 
                t: "اعشقج حد الموت", 
                p: "مارية، والله العظيم أحبج حب ما إله حدود. انتي النفس مالتي والله.", 
                g: "https://media.tenor.com/2m_SAnzXvYgAAAAi/hello-kitty-jet-plane.gif",
                bg: "linear-gradient(135deg, #667eea, #764ba2)",
                btn: "آخر ضغطة ❤️"
            },
            { 
                t: "توقيع بالحب ❤️", 
                p: "رسمياً: حيدر ومارية سوا للأبد. والزعل ممنوع يدخل بينا بعد اليوم. أحبج ماريتي!", 
                g: "https://media.tenor.com/OnvS5O4Vn4AAAAAi/study-busy.gif",
                bg: "linear-gradient(135deg, #ff0844, #ffb199)",
                btn: "تم الصلح بنجاح ✅"
            }
        ];

        let currentPage = 0;

        // صنع النقاط
        const dotsContainer = document.getElementById('dots-container');
        story.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `dot ${i === 0 ? 'active-dot' : ''}`;
            dotsContainer.appendChild(dot);
        });

        function nextPage() {
            if (currentPage < story.length - 1) {
                currentPage++;
                updatePage();
            } else {
                alert("تم إرسال كل الحب لقلب مارية! ❤️");
            }
        }

        function updatePage() {
            const data = story[currentPage];
            document.body.style.background = data.bg;
            document.getElementById('main-title').innerText = data.t;
            document.getElementById('main-text').innerText = data.p;
            document.getElementById('main-gif').src = data.g;
            document.getElementById('btn-text').innerText = data.btn;

            // إخفاء/إظهار القلب
            if (data.special === "heart") {
                document.getElementById('big-heart').style.display = "block";
                document.getElementById('main-text').style.display = "none";
            } else {
                document.getElementById('big-heart').style.display = "none";
                document.getElementById('main-text').style.display = "block";
            }

            // تحديث النقاط
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => {
                d.className = i === currentPage ? 'dot active-dot' : 'dot';
            });

            // تغيير نوع المطر
            createParticles(currentPage % 2 === 0 ? '❤️' : '✨');
        }

        function heartPop() {
            alert("حسيتي بنبض قلبي شكد يحبج؟ ❤️");
            nextPage();
        }

        // صنع القلوب والنجوم المتساقطة
        function createParticles(symbol) {
            const container = document.getElementById('particles');
            container.innerHTML = "";
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = symbol;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 3 + 2) + 's';
                p.style.fontSize = (Math.random() * 20 + 10) + 'px';
                container.appendChild(p);
            }
        }

        createParticles('❤️');
    </script>
</body>
</html>
