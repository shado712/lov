<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ملكة قلبي مارية 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #ffe5ec; --main-text: #660708; --btn-bg: #ff4d6d; }
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: radial-gradient(circle, #ffe5ec, #fff0f3); color: var(--main-text);
        }

        /* مطر القلوب بالخلفية */
        .hearts-bg { position: fixed; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart-fall { position: absolute; animation: fall linear infinite; color: #ffb3c1; font-size: 20px; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* حاوية العرض الرئيسية - بدون حدود Border */
        .container {
            width: 85%; max-width: 400px; height: 500px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; box-sizing: border-box; text-align: center;
        }

        /* البطاقة البيضاء للملصقات - حواف ناعمة */
        .sticker-card {
            width: 250px; height: 250px;
            background-color: #ffffff;
            border-radius: 40px; /* حواف أنثوية وناعمة جداً */
            margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 179, 193, 0.4);
            animation: fadeIn 1s ease;
        }
        /* حجم الملصق التعبيري الكبير جداً */
        .sticker-card .big-emoji { font-size: 150px; }

        /* القلب النباض التفاعلي */
        .heart-icon { font-size: 100px; color: #ff4d6d; cursor: pointer; animation: pulse 0.8s infinite; filter: drop-shadow(0 0 10px #ff4d6d); display: none; margin-bottom: 25px;}
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* تنسيق النصوص حرة - بدون حدود */
        .content { min-height: 100px; margin-bottom: 30px; animation: fadeIn 1.2s ease; }
        .content h1 { font-size: 26px; color: #ff758f; margin-bottom: 10px; font-weight: 900; }
        .content p { font-size: 18px; line-height: 1.7; color: var(--main-text); margin: 0; font-weight: 600; }

        /* الأزرار التفاعلية - تصميم أنثوي */
        .btn-nav {
            background: var(--btn-bg); color: white; border: none;
            padding: 15px 45px; border-radius: 50px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s ease;
        }
        .btn-nav:hover { background: #ff758f; transform: translateY(-3px); }
        .btn-nav:active { transform: scale(0.95); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts"></div>

    <div class="container" id="main-container">
        </div>

    <script>
        // مصفوفة البيانات بملصقات كبيرة (Emojis) لكل صفحة
        const story = [
            // 1. ترحيب
            { t: "يا هلا برقوية ✨", p: "رقية البطلة، الثالث متوسط مو مجرد امتحانات، هو أول خطوة حقيقية لرسم مستقبلج العظيم.", e: "🌸", b: "مستعدة؟ ✨" },
            // 2. فخر حيدر
            { t: "حيدر فخور بيج هواي", p: "أنتي مو بس أختي، أنتي فخر العائلة. أريدج ترفعين راسنا وتثبتين للكل إن رقية كدها.", e: "👸", b: "كملي القراءة ✨" },
            // 3. تخيل النتيجة
            { t: "تخيلي يوم النتيجة 😍", p: "تخيلي فرحة الوالد والوالدة دموع الفرح بعين أبوج وأمج. كل تعب تسهريه هسة يسوى.", e: "🎉", b: "ماكو مستحيل ✨" },
            // 4. التشجيع على الدراسة
            { t: "الدراسة سر قوتج 📖", p: "رتبي كتبج، وقولي (أني كدها). رقية ما تنهزم، رقية هي اللي تصنع المعجزات.", e: "👩‍🎓", b: "بقت أيام قليلة ✨" },
            // 5. القلب التفاعلي (مفاجأة) - لا يوجد ستيكر، يظهر قلب
            { t: "دكتورة المستقبل ✨", p: "اضغطي على قلبج وشوفي شكد يشتاق للنجاح.. ادرسي لرقية المستقبيلة.", e: "", isHeart: true, b: "دوسي عالقلب 👇" },
            // 6. الوعد بالنجاح
            { t: "وعد للنجاح؟ 💍", p: "أريد منج وعد يا رقية، انو متبجين من مادة صعبة، بل تحاولين لحد ما تسيطرين عليها.", e: "🏆", b: "أحبج رقية ❤️" },
            // 7. الختام
            { t: "مستقبلج ينتظرج ❤️", p: "انتهى وقت الكلام.. حلمج يصيحج هسة، روحي ادرسي وعيني باردة عليج! أحلى عطلة ننتظرها.", e: "💝", b: "يلا ادرسي ✅" }
        ];

        let currentIdx = 0;
        const container = document.getElementById('main-container');

        // دالة لعرض الصفحة
        function renderPage() {
            const data = story[currentIdx];
            container.innerHTML = `
                ${data.isHeart ? 
                    `<div class="heart-icon" style="display: block;" onclick="nextPage()">❤️</div>` : 
                    `<div class="sticker-card"><div class="big-emoji">${data.e}</div></div>`}
                <div class="content">
                    <h1>${data.t}</h1>
                    <p>${data.p}</p>
                </div>
                ${data.isHeart ? '' : `<button class="btn-nav" onclick="nextPage()">${data.b}</button>`}
            `;
        }

        // دالة الانتقال للصفحة التالية
        function nextPage() {
            if (currentIdx < story.length - 1) {
                currentIdx++;
                renderPage();
            } else {
                alert("ربي يحفظج يا رقية وينجحج! ❤️");
                container.innerHTML = `<div class="content"><h1>تم إرسال دعاء النجاح لقلبج ❤️</h1><p>يلا كافي نت، روحي ادرسي!</p></div>`;
            }
        }

        // مطر القلوب
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart-fall'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '-50px';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.getElementById('hearts').appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 400);

        // عرض أول صفحة
        renderPage();
    </script>
</body>
</html>
