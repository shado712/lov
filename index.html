<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى مارية</title>
    <style>
        body { background-color: #ffeef2; text-align: center; font-family: 'Arial', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: white; padding: 20px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 85%; max-width: 350px; position: relative; }
        img { width: 160px; height: auto; margin-bottom: 20px; border-radius: 10px; }
        h1 { color: #ff4d6d; font-size: 20px; min-height: 60px; line-height: 1.6; }
        button { background-color: #ff4d6d; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; font-weight: bold; }
        button:hover { background-color: #ff758f; transform: scale(1.05); }
        .footer { font-size: 12px; color: #adb5bd; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <img src="https://media.tenor.com/vH97Zf_9680AAAAi/hello-kitty-flower.gif" id="image">
            <h1 id="text">مارية موجودة؟ 🌸</h1>
            <button onclick="nextStep()" id="btn">اي وضايعة عوفني حيدر 😔</button>
        </div>
        <div class="footer">صنع بكل حب من حيدر ❤️</div>
    </div>

    <script>
        let step = 0;
        const data = [
            { t: "شلون اكدر اعوفج مارية شوفي؟ 🥺", b: "شنو هو؟", i: "https://media.tenor.com/Z45Z1A7_0mUAAAAi/hello-kitty.gif" },
            { t: "مارية عندي سؤال الججج 🙈", b: "اسألني حيدر", i: "https://media.tenor.com/K_f9_9Obeo0AAAAi/hello-kitty-blushing.gif" },
            { t: "تحبين حيدر لو لأأ !!؟ 🥺👉👈", b: "مدري / هاه؟", i: "https://media.tenor.com/OnY_qNqE4p8AAAAi/hello-kitty-shy.gif" },
            { t: "اذا تحبيني دوسي على القلب ❤️", b: "❤️ أحبك حيدوري ❤️", i: "https://media.tenor.com/V7_5zWv-A60AAAAi/hello-kitty-love.gif" },
            { t: "كلشي ولا ضوجتج مارية.. اعشقج واحبج ❤️🥰", b: "أني هم أعشقك حيدر 🥺", i: "https://media.tenor.com/j_6W_Xq-S0AAAAAi/hello-kitty-sanrio.gif" }
        ];

        function nextStep() {
            if (step < data.length) {
                document.getElementById('text').innerText = data[step].t;
                document.getElementById('btn').innerText = data[step].b;
                document.getElementById('image').src = data[step].i;
                step++;
            } else {
                // المشهد الأخير
                document.getElementById('text').innerText = "تم إرسال الحب لقلب مارية بنجاح! ❤️🌸";
                document.getElementById('btn').style.display = 'none';
                document.getElementById('image').src = "https://media.tenor.com/2m_SAnzXvYgAAAAi/hello-kitty-jet-plane.gif";
            }
        }
    </script>
</body>
</html>
