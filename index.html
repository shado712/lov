<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى مارية 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; background-color: #121212; color: white;
        }

        .main-wrapper {
            width: 100%; max-width: 450px; height: 100vh;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }

        .slide.active { transform: translateX(0); }
        .slide.prev { transform: translateX(-100%); }

        /* الصورة المربعة الاحترافية */
        .img-square {
            width: 320px; height: 320px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #fff;
            margin-bottom: 30px;
        }
        .img-square img { width: 100%; height: 100%; object-fit: cover; }

        /* القلب التفاعلي الكبير */
        .interactive-heart {
            font-size: 100px;
            cursor: pointer;
            animation: pulse 0.8s infinite;
            filter: drop-shadow(0 0 20px #ff4d6d);
            margin: 20px 0;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .content-box { text-align: center; width: 85%; margin-bottom: 40px; }
        .content-box h1 { font-size: 24px; color: #ff8fa3; margin-bottom: 10px; }
        .content-box p { font-size: 18px; line-height: 1.6; color: #e0e0e0; margin: 0; }

        .btn-action {
            background: #ff4d6d; color: white; border: none;
            padding: 12px 45px; border-radius: 50px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            transition: 0.3s;
        }
        .btn-action:active { transform: scale(0.9); }

        .hearts-bg { position: fixed; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart-unit { position: absolute; color: rgba(255, 77, 109, 0.4); animation: drift linear infinite; }
        @keyframes drift { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts"></div>
    <div class="main-wrapper" id="slider"></div>

    <script>
        const data = [
            { t: "مارية.. اعتذر 😔", p: "أدري الزعل أخذ مساحة بقلبج، بس والله الدنيا تظلم بعيني لو ضجتي لحظة.", g: "https://media.tenor.com/b9UaH8B6_OQAAAAi/mochi-peach.gif" },
            { t: "اضغطي على قلبي ❤️", p: "حتى تعرفين شكد أحبج..", g: "https://media.tenor.com/V7_5zWv-A60AAAAi/hello-kitty-love.gif", isHeart: true },
            { t: "وعد من حيدر 💍", p: "أوعدج من اليوم ما أخلي دمعة تنزل من عينج دائمًا.", g: "https://media.tenor.com/K_f9_9Obeo0AAAAi/hello-kitty-blushing.gif" },
            { t: "أعشقج هواي ❤️", p: "حيدر ومارية سوا للأبد. الزعل ممنوع!", g: "https://media.tenor.com/2m_SAnzXvYgAAAAi/hello-kitty-jet-plane.gif" }
        ];

        let currentIdx = 0;
        const slider = document.getElementById('slider');

        data.forEach((item, i) => {
            const slide = document.createElement('div');
            slide.className = `slide ${i === 0 ? 'active' : ''}`;
            
            let middleContent = `<div class="img-square"><img src="${item.g}"></div>`;
            if (item.isHeart) {
                middleContent = `<div class="interactive-heart" onclick="nextSlide()">❤️</div>`;
            }

            slide.innerHTML = `
                ${middleContent}
                <div class="content-box">
                    <h1>${item.t}</h1>
                    <p>${item.p}</p>
                </div>
                ${!item.isHeart ? `<button class="btn-action" onclick="nextSlide()">اسأليني ✨</button>` : ''}
            `;
            slider.appendChild(slide);
        });

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if (currentIdx < slides.length - 1) {
                slides[currentIdx].classList.remove('active');
                slides[currentIdx].classList.add('prev');
                currentIdx++;
                slides[currentIdx].classList.add('active');
            } else {
                alert("تم الصلح بنجاح! ❤️");
            }
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart-unit';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '-50px';
            h.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.getElementById('hearts').appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 400);
    </script>
</body>
</html>
