<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى زهرتي</title>
    <style>
        body { background-color: #ffeef2; text-align: center; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 85%; max-width: 350px; }
        img { width: 160px; height: auto; border-radius: 15px; margin-bottom: 15px; }
        h1 { color: #ff4d6d; font-size: 20px; margin-bottom: 20px; line-height: 1.5; }
        button { background-color: #ff4d6d; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 15px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        button:hover { transform: scale(1.05); background-color: #ff758f; }
    </style>
</head>
<body>

    <div class="container">
        <div id="p1">
            <img src="https://media.tenor.com/vH97Zf_9680AAAAi/hello-kitty-flower.gif">
            <h1>حبيبتي موجودة؟ 🌸</h1>
            <button onclick="show(2)">اي وضايعة عوفي 😔</button>
        </div>

        <div id="p2" style="display:none;">
            <img src="https://media.tenor.com/Z45Z1A7_0mUAAAAi/hello-kitty.gif">
            <h1>شلون اكدر اعوفج شوفي؟</h1>
            <button onclick="show(3)">شنو هو؟</button>
        </div>

        <div id="p3" style="display:none;">
            <img src="https://media.tenor.com/K_f9_9Obeo0AAAAi/hello-kitty-blushing.gif">
            <h1>زهرتي عندي سؤال الججج</h1>
            <button onclick="show(4)">اسأليني</button>
        </div>

        <div id="p4" style="display:none;">
            <img src="https://media.tenor.com/V7_5zWv-A60AAAAi/hello-kitty-love.gif">
            <h1>كلشي ولا ضوجتج زهرتي.. أحبج ❤️</h1>
            <button onclick="alert('أحلى زهرة بالدنيا! 🥰')">اعشقج واحبج 🥺❤️</button>
        </div>
    </div>

    <script>
        function show(num) {
            document.getElementById('p1').style.display = 'none';
            document.getElementById('p2').style.display = 'none';
            document.getElementById('p3').style.display = 'none';
            document.getElementById('p4').style.display = 'none';
            document.getElementById('p' + num).style.display = 'block';
        }
    </script>
</body>
</html>
