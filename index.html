<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى مارية ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root { --speed: 0.8s; }
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: background var(--speed) ease, color var(--speed) ease;
            background-color: #0b0b0b; color: white;
        }

        .main-wrapper {
            width: 100%; max-width: 450px; height: 100vh;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%); z-index: 1;
        }

        .slide.active { transform: translateX(0); z-index: 2; }
        .slide.prev { transform: translateX(-100%); z-index: 1; }

        /* البطاقة البيضاء للستيكرات - تصميم أنثوي */
        .img-card {
            width: 280px; height: 280px;
            border-radius: 40px; overflow: hidden;
            background: #fff; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(255, 143, 163, 0.3);
            margin-bottom: 25px; border: 5px solid #ffdeeb;
        }
        .img-card span { font-size: 140px; }

        /* القلب التفاعلي */
        .interactive-heart {
            font-size: 110px; cursor: pointer; animation: pulse 0.8s infinite;
            filter: drop-shadow(0 0 20px #ff4d6d); margin: 30px 0;
            pointer-events: auto !important;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        .content-box { text-align: center; width: 85%; margin-bottom: 35px; }
        .content-box h1 { font-size: 26px; color: #ff8fa3; margin-bottom: 10px; }
        .content-box p { font-size: 18px; line-height: 1.6; margin: 0; }

        .btn-action {
            background: #ff4d6d; color: white; border: none;
            padding: 14px 55px; border-radius: 50px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.4);
            transition: 0.3s; pointer-events: auto;
        }

        .hearts-bg { position: fixed; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart-unit { position: absolute; animation: drift linear infinite; opacity: 0.6; }
        @keyframes drift { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts"></div>
    <div class="main-wrapper" id="slider"></div>

    <script>
        const storyData = [
            { t: "مارية.. اعتذر 😔", p: "أدري الزعل أخذ مساحة بقلبج، بس والله الدنيا تظلم بعيني لو ضجتي لحظة.", e: "🌸", b: "ممكن تسامحيني؟", bg: "#0b0b0b", tc: "white" },
            { t: "يا ملكة قلبي 👑", p: "انتي تامرين وحيدر ينفذ. المهم ترجع الضحكة لوجهج المنور.", e: "👸", b: "تؤمرين ❤️", bg: "#1a1a2e", tc: "white" },
            { t: "يا وردتي 🌷", p: "انتي الوردة اللي بستاني، وبدونج الأيام ما بيها طعم.", e: "💐", b: "أحبج 🥺", bg: "#311b33", tc: "white" },
            { t: "اضغطي على قلبي ❤️", p: "حتى تعرفين شكد يحبج ويشتاقلج..", isHeart: true, bg: "#5c2b4c", tc: "white" },
            { t: "وعد حيدر 💍", p: "أوعدج من اليوم أكون لج السند والأمان دائمًا.", e: "🎀", b: "وعد؟ ✨", bg: "#8c3b5d", tc: "white" },
            { t: "يا شمس حياتي ☀️", p: "انتي النور اللي يضوي طريقي. فديتج يا ماريتي.", e: "🦄", b: "يا روحي ❤️", bg: "#c44c6c", tc: "white" },
            { t: "انتي طفلتي المدللة 🧸", p: "مسموح لج تتنفسين وتتدللين، بس لا تبتعدين عني.", e: "🍭", b: "تدللين ✅", bg: "#ff758f", tc: "white" },
            { t: "اعشقج هواي", p: "مارية، انتي النفس مالتي والله. أحبج حب ماله حدود.", e: "💝", b: "أحبك حيدر ❤️", bg: "#ffb3c1", tc: "#333" },
            { t: "تم الصلح؟ 💍", p: "حيدر ومارية سوا للأبد. الزعل ممنوع من اليوم!", e: "👸", b: "تم الصلح ✅", bg: "#ffe5ec", tc: "#333" }
        ];

        let currentIdx = 0;
        const slider = document.getElementById('slider');

        storyData.forEach((item, i) => {
            const slide = document.createElement('div');
            slide.className = `slide ${i === 0 ? 'active' : ''}`;
            
            let middleContent = `<div class="img-card"><span>${item.e}</span></div>`;
            if (item.isHeart) {
                middleContent = `<div class="interactive-heart" onclick="nextSlide()">❤️</div>`;
            }

            slide.innerHTML = `
                ${middleContent}
                <div class="content-box">
                    <h1 style="${item.tc === '#333' ? 'color:#ff4d6d' : ''}">${item.t}</h1>
                    <p>${item.p}</p>
                </div>
                ${!item.isHeart ? `<button class="btn-action" onclick="nextSlide()">${item.b}</button>` : ''}
            `;
            slider.appendChild(slide);
        });

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if (currentIdx < slides.length - 1) {
                slides[currentIdx].classList.remove('active');
                slides[currentIdx].classList.add('prev');
                currentIdx++;
                slides[currentIdx].classList.add('active');
                
                document.body.style.backgroundColor = storyData[currentIdx].bg;
                document.body.style.color = storyData[currentIdx].tc;
            } else {
                alert("تم إرسال كل الحب لقلب مارية! ❤️");
            }
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart-unit'; h.innerHTML = '💗';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '-50px';
            h.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.getElementById('hearts').appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 400);
    </script>
</body>
</html>
